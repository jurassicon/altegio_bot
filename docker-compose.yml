services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-altegio_bot}
      POSTGRES_USER: ${POSTGRES_USER:-altegio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-altegio} -d ${POSTGRES_DB:-altegio_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  altegio-api:
    build: .
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["/app/.venv/bin/uvicorn", "altegio_bot.main:app", "--host", "0.0.0.0", "--port", "8000"]

  altegio-inbox-worker:
    build: .
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["/app/.venv/bin/python", "-m", "altegio_bot.scripts.run_inbox_worker"]

  altegio-outbox-worker:
    build: .
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["/app/.venv/bin/python", "-m", "altegio_bot.scripts.run_outbox_worker"]

volumes:
  postgres_data:
  redis_data:
