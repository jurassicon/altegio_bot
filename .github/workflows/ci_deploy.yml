name: CI + Deploy

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: altegio-bot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'

      - name: Install deps
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q

  deploy:
    needs: tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail

            cd /opt/altegio_bot

            git fetch origin main
            git reset --hard origin/main

            if ! docker ps --format '{{.Names}}' | grep -qx 'altegio-postgres'; then
              echo 'ERROR: altegio-postgres container is not running' >&2
              exit 1
            fi

            docker build -t altegio-bot:latest .

            IMG='altegio-bot:latest'
            ENV_FILE='/opt/altegio_bot/.env'
            NET='altegio-net'

            docker network inspect "${NET}" >/dev/null 2>&1 || docker network create "${NET}"
            docker network connect "${NET}" altegio-postgres 2>/dev/null || true

            docker run --rm \
              --network "${NET}" \
              "${IMG}" \
              python -c 'import socket; socket.getaddrinfo("altegio-postgres", 5432); print("dns ok")'

            docker run --rm \
              --network "${NET}" \
              --env-file "${ENV_FILE}" \
              "${IMG}" \
              /app/.venv/bin/alembic upgrade head

            docker rm -f \
              altegio-api \
              altegio-inbox-worker \
              altegio-outbox-worker \
              altegio-whatsapp-inbox-worker \
              2>/dev/null || true

            docker run -d \
              --name altegio-api \
              --restart unless-stopped \
              --network "${NET}" \
              -p 8000:8000 \
              --env-file "${ENV_FILE}" \
              "${IMG}" \
              /app/.venv/bin/uvicorn altegio_bot.main:app --host 0.0.0.0 --port 8000

            docker run -d \
              --name altegio-outbox-worker \
              --restart unless-stopped \
              --network "${NET}" \
              --env-file "${ENV_FILE}" \
              "${IMG}" \
              /app/.venv/bin/python -m altegio_bot.scripts.run_outbox_worker

            docker run -d \
              --name altegio-inbox-worker \
              --restart unless-stopped \
              --network "${NET}" \
              --env-file "${ENV_FILE}" \
              "${IMG}" \
              /app/.venv/bin/python -m altegio_bot.workers.inbox_worker

            docker run -d \
              --name altegio-whatsapp-inbox-worker \
              --restart unless-stopped \
              --network "${NET}" \
              --env-file "${ENV_FILE}" \
              "${IMG}" \
              /app/.venv/bin/python -m altegio_bot.scripts.run_whatsapp_inbox_worker

            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}' | \
              grep -E 'altegio-(api|postgres|inbox-worker|outbox-worker|whatsapp-inbox-worker)'

            docker container prune -f
            docker image prune -f
            docker builder prune -f

  notify:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Notify via Telegram
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_TO }}
          message: |
            🚀 *Altegio_bot deployed successfully!*
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`