name: CI / Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: altegio-bot-main
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: altegio_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d altegio_bot_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/altegio_bot_test
      ALTEGIO_WEBHOOK_SECRET: test-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install deps
        run: uv sync --frozen
      - name: Wait for Postgres
        run: |
          uv run python - <<'PY'
          import asyncio
          import os
          import asyncpg
          def to_asyncpg_dsn(sqlalchemy_dsn: str) -> str:
              dsn = sqlalchemy_dsn.strip().strip('"').strip("'")
              if dsn.startswith('postgresql+asyncpg://'):
                  return 'postgresql://' + dsn.split('://', 1)[1]
              return dsn
          async def main() -> None:
              raw = os.environ['DATABASE_URL']
              dsn = to_asyncpg_dsn(raw)
              for _ in range(120):
                  try:
                      conn = await asyncpg.connect(dsn, timeout=3)
                      await conn.close()
                      print('Postgres is ready')
                      return
                  except:
                      await asyncio.sleep(1)
              raise SystemExit('Postgres did not become ready')
          asyncio.run(main())
          PY
      - name: Run tests
        run: uv run pytest -q

  deploy:
    needs: tests
    if: needs.tests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            
            cd /opt/altegio_bot
            
            echo "📦 Fetching new code..."
            git fetch origin main
            git reset --hard origin/main
            
            # Мы не делаем 'down', чтобы не прерывать работу базы данных без нужды.
            # 'up -d' сам перезапустит только те контейнеры, где изменился код или настройки.
            echo "🚀 Deployment with Orphan removal..."
            docker compose up -d --build --remove-orphans
            
            # Ожидаем готовности API
            sleep 5
            
            echo "init Migrations..."
            docker exec altegio_bot_altegio-api_1 /app/.venv/bin/alembic upgrade head
            
            echo "🧹 Aggressive cleanup of unused images..."
            # Флаг -a удаляет все образы, которые не используются запущенными контейнерами
            docker image prune -af
            
            echo "✅ Done! Containers status:"
            docker compose ps

  notify:
    needs: [tests, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Telegram notify
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🤖 AltegioBot CI / Deploy report

            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Tests: ${{ needs.tests.result }}
            Deploy: ${{ needs.deploy.result }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}