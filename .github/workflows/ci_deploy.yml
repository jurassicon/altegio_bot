name: CI / Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: altegio_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd 'pg_isready -U postgres -d altegio_bot_test'
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install deps
        run: uv sync --frozen

      - name: Run tests
        env:
          DATABASE_URL: 'postgresql+asyncpg://postgres:postgres@localhost:5432/altegio_bot_test'
          ALTEGIO_WEBHOOK_SECRET: 'test-secret'
        run: uv run pytest -q

  deploy:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail

            cd /opt/altegio_bot

            git fetch origin main
            git reset --hard origin/main

            docker build -t altegio-bot:latest .

            IMG='altegio-bot:latest'
            ENV_FILE='/opt/altegio_bot/.env'
            NET='altegio-net'

            if [ ! -f "${ENV_FILE}" ]; then
              echo "ERROR: env file not found: ${ENV_FILE}" >&2
              exit 1
            fi

            DB_URL="$(grep -E '^DATABASE_URL=' "${ENV_FILE}" | head -n 1 | cut -d= -f2- || true)"
            if [ -z "${DB_URL}" ]; then
              echo 'ERROR: DATABASE_URL is missing in .env' >&2
              exit 1
            fi

            if echo "${DB_URL}" | grep -Eq '@(localhost|127\.0\.0\.1)'; then
              echo 'ERROR: DATABASE_URL points to localhost.' >&2
              echo 'Use a docker hostname, e.g. altegio-postgres.' >&2
              exit 1
            fi

            docker network inspect "${NET}" >/dev/null 2>&1 || docker network create "${NET}"

            docker network connect "${NET}" altegio-postgres 2>/dev/null || true

            docker run --rm \
              --network "${NET}" \
              -v "${ENV_FILE}:/app/.env:ro" \
              "${IMG}" \
              /app/.venv/bin/alembic upgrade head

            docker rm -f \
              altegio-api \
              altegio-inbox-worker \
              altegio-outbox-worker \
              altegio-whatsapp-inbox-worker \
              2>/dev/null || true

            docker run -d \
              --name altegio-api \
              --restart unless-stopped \
              --network "${NET}" \
              -p 8000:8000 \
              -v "${ENV_FILE}:/app/.env:ro" \
              "${IMG}" \
              /app/.venv/bin/uvicorn altegio_bot.main:app --host 0.0.0.0 --port 8000

            docker run -d \
              --name altegio-outbox-worker \
              --restart unless-stopped \
              --network "${NET}" \
              -v "${ENV_FILE}:/app/.env:ro" \
              "${IMG}" \
              /app/.venv/bin/python -m altegio_bot.scripts.run_outbox_worker

            docker run -d \
              --name altegio-inbox-worker \
              --restart unless-stopped \
              --network "${NET}" \
              -v "${ENV_FILE}:/app/.env:ro" \
              "${IMG}" \
              /app/.venv/bin/python -m altegio_bot.scripts.run_inbox_worker

            docker run -d \
              --name altegio-whatsapp-inbox-worker \
              --restart unless-stopped \
              --network "${NET}" \
              -v "${ENV_FILE}:/app/.env:ro" \
              "${IMG}" \
              /app/.venv/bin/python -m altegio_bot.scripts.run_whatsapp_inbox_worker

            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}' | \
              grep -E 'altegio-(api|postgres|inbox-worker|outbox-worker|whatsapp-inbox-worker)'

            docker container prune -f
            docker image prune -f
            docker builder prune -f

  notify:
    needs: deploy
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      - name: Telegram notify
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            altegio_bot deploy: ${{ job.status }}
            repo: ${{ github.repository }}
            branch: ${{ github.ref_name }}
            sha: ${{ github.sha }}
            run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}