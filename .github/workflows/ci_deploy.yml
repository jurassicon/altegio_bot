name: CI / Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: altegio_bot_test
        # ИСПРАВЛЕНИЕ 1: Биндим на порт 5433, чтобы не конфликтовать с локальным PG раннера
        ports:
          - 5433:5432
        options: >-
          --health-cmd 'pg_isready -U postgres -d altegio_bot_test'
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install deps
        run: uv sync --frozen

      - name: Run tests
        env:
          # ИСПРАВЛЕНИЕ 2: Стучимся в порт 5433
          DATABASE_URL: 'postgresql+asyncpg://postgres:postgres@localhost:5433/altegio_bot_test'
          ALTEGIO_WEBHOOK_SECRET: 'test-secret'
        run: uv run pytest -q

  deploy:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            cd /opt/altegio_bot

            # Обновляем код
            git fetch origin main
            git reset --hard origin/main

            # Билдим
            docker build -t altegio-bot:latest .

            IMG='altegio-bot:latest'
            ENV_FILE='/opt/altegio_bot/.env'
            NET='altegio-net'

            # Проверки
            if [ ! -f "${ENV_FILE}" ]; then
              echo "ERROR: env file not found: ${ENV_FILE}" >&2
              exit 1
            fi

            # Миграции
            docker network inspect "${NET}" >/dev/null 2>&1 || docker network create "${NET}"
            docker network connect "${NET}" altegio-postgres 2>/dev/null || true

            docker run --rm \
              --network "${NET}" \
              -v "${ENV_FILE}:/app/.env:ro" \
              "${IMG}" \
              /app/.venv/bin/alembic upgrade head

            # Перезапуск контейнеров
            # Удаляем старые
            docker rm -f \
              altegio-api \
              altegio-inbox-worker \
              altegio-outbox-worker \
              altegio-whatsapp-inbox-worker \
              2>/dev/null || true

            # 1. API
            docker run -d \
              --name altegio-api \
              --restart unless-stopped \
              --network "${NET}" \
              -p 8000:8000 \
              -v "${ENV_FILE}:/app/.env:ro" \
              "${IMG}" \
              /app/.venv/bin/uvicorn altegio_bot.main:app --host 0.0.0.0 --port 8000

            # 2. Outbox Worker
            docker run -d \
              --name altegio-outbox-worker \
              --restart unless-stopped \
              --network "${NET}" \
              -v "${ENV_FILE}:/app/.env:ro" \
              "${IMG}" \
              /app/.venv/bin/python -m altegio_bot.scripts.run_outbox_worker

            # 3. Inbox Worker
            docker run -d \
              --name altegio-inbox-worker \
              --restart unless-stopped \
              --network "${NET}" \
              -v "${ENV_FILE}:/app/.env:ro" \
              "${IMG}" \
              /app/.venv/bin/python -m altegio_bot.scripts.run_inbox_worker

            # 4. Whatsapp Inbox Worker
            docker run -d \
              --name altegio-whatsapp-inbox-worker \
              --restart unless-stopped \
              --network "${NET}" \
              -v "${ENV_FILE}:/app/.env:ro" \
              "${IMG}" \
              /app/.venv/bin/python -m altegio_bot.scripts.run_whatsapp_inbox_worker

            # Чистка
            docker container prune -f
            docker image prune -f

  notify:
    # ИСПРАВЛЕНИЕ 3: Ждем и тесты, и деплой, чтобы знать их статус
    needs: [tests, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Telegram notify
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          # ИСПРАВЛЕНИЕ 4: Формируем сообщение в зависимости от реального итога
          message: |
            🔔 CI/CD Pipeline Report
            
            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            
            📊 Status:
            - Tests: ${{ needs.tests.result }}
            - Deploy: ${{ needs.deploy.result }}
            
            🔗 Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}