name: CI / Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: altegio_bot_test
        # Исправляем порт, чтобы не конфликтовать с локальным PG
        ports:
          - 5433:5432
        # ИСПРАВЛЕНИЕ ОШИБКИ Docker: убрали сложные кавычки и флаги
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install deps
        run: uv sync --frozen

      - name: Run tests
        env:
          # Подключаемся к 5433 (порт сервиса)
          DATABASE_URL: 'postgresql+asyncpg://postgres:postgres@localhost:5433/altegio_bot_test'
          ALTEGIO_WEBHOOK_SECRET: 'test-secret'
        run: uv run pytest -q

  deploy:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            cd /opt/altegio_bot

            # Обновляем код
            git fetch origin main
            git reset --hard origin/main

            # Билдим
            docker build -t altegio-bot:latest .

            IMG='altegio-bot:latest'
            ENV_FILE='/opt/altegio_bot/.env'
            NET='altegio-net'

            if [ ! -f "${ENV_FILE}" ]; then
              echo "ERROR: env file not found" >&2
              exit 1
            fi

            # Сеть и миграции
            docker network inspect "${NET}" >/dev/null 2>&1 || docker network create "${NET}"
            docker network connect "${NET}" altegio-postgres 2>/dev/null || true

            docker run --rm \
              --network "${NET}" \
              -v "${ENV_FILE}:/app/.env:ro" \
              "${IMG}" \
              /app/.venv/bin/alembic upgrade head

            # Перезапуск
            docker rm -f altegio-api altegio-outbox-worker altegio-inbox-worker altegio-whatsapp-inbox-worker 2>/dev/null || true

            # Запуск контейнеров
            docker run -d --name altegio-api --restart unless-stopped --network "${NET}" -p 8000:8000 -v "${ENV_FILE}:/app/.env:ro" "${IMG}" /app/.venv/bin/uvicorn altegio_bot.main:app --host 0.0.0.0 --port 8000
            
            docker run -d --name altegio-outbox-worker --restart unless-stopped --network "${NET}" -v "${ENV_FILE}:/app/.env:ro" "${IMG}" /app/.venv/bin/python -m altegio_bot.scripts.run_outbox_worker
            
            docker run -d --name altegio-inbox-worker --restart unless-stopped --network "${NET}" -v "${ENV_FILE}:/app/.env:ro" "${IMG}" /app/.venv/bin/python -m altegio_bot.scripts.run_inbox_worker
            
            docker run -d --name altegio-whatsapp-inbox-worker --restart unless-stopped --network "${NET}" -v "${ENV_FILE}:/app/.env:ro" "${IMG}" /app/.venv/bin/python -m altegio_bot.scripts.run_whatsapp_inbox_worker

            # Чистка
            docker container prune -f
            docker image prune -f

  notify:
    # Запускаем, даже если тесты упали, но ждем завершения обоих этапов
    needs: [tests, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Telegram notify
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          # Теперь сообщение покажет реальный статус каждого этапа
          message: |
            🤖 AltegioBot Deploy Report
            
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            
            📋 Status:
            Tests: ${{ needs.tests.result }}
            Deploy: ${{ needs.deploy.result }}
            
            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}