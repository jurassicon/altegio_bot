name: CI + Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: altegio-bot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: altegio_bot_test
        ports:
          - 5432/tcp
        options: >-
          --health-cmd='pg_isready -U postgres -d altegio_bot_test'
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      PYTHONPATH: src
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/altegio_bot_test
      ALTEGIO_WEBHOOK_SECRET: test_secret

      WHATSAPP_WEBHOOK_VERIFY_TOKEN: test
      WHATSAPP_ACCESS_TOKEN: test
      WHATSAPP_GRAPH_URL: https://graph.facebook.com
      WHATSAPP_API_VERSION: v20.0
      META_WA_PHONE_NUMBER_ID: '1'
      META_WABA_ID: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install deps
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /opt/altegio_bot

            git fetch origin main
            git reset --hard origin/main

            docker build -t altegio-bot:latest .

            NET='altegio-net'
            ENV_FILE='/opt/altegio_bot/.env'
            IMG='altegio-bot:latest'

            docker network inspect "${NET}" >/dev/null 2>&1 || docker network create "${NET}"
            docker network connect "${NET}" altegio-postgres 2>/dev/null || true

            docker run --rm --network "${NET}" -v "${ENV_FILE}:/app/.env:ro" \
              "${IMG}" sh -c 'set -a; . /app/.env; set +a; /app/.venv/bin/alembic upgrade head'

            docker rm -f altegio-api altegio-inbox-worker altegio-outbox-worker altegio-whatsapp-inbox-worker 2>/dev/null || true

            docker run -d --name altegio-api --restart unless-stopped --network "${NET}" \
              -p 8000:8000 -v "${ENV_FILE}:/app/.env:ro" "${IMG}" \
              /app/.venv/bin/uvicorn altegio_bot.main:app --host 0.0.0.0 --port 8000

            docker run -d --name altegio-outbox-worker --restart unless-stopped --network "${NET}" \
              -v "${ENV_FILE}:/app/.env:ro" "${IMG}" \
              sh -c 'set -a; . /app/.env; set +a; /app/.venv/bin/python -m altegio_bot.workers.outbox_worker'

            docker run -d --name altegio-inbox-worker --restart unless-stopped --network "${NET}" \
              -v "${ENV_FILE}:/app/.env:ro" "${IMG}" \
              sh -c 'set -a; . /app/.env; set +a; /app/.venv/bin/python -m altegio_bot.workers.inbox_worker'

            docker run -d --name altegio-whatsapp-inbox-worker --restart unless-stopped --network "${NET}" \
              -v "${ENV_FILE}:/app/.env:ro" "${IMG}" \
              sh -c 'set -a; . /app/.env; set +a; /app/.venv/bin/python -m altegio_bot.scripts.run_whatsapp_inbox_worker'

            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}' | \
              grep -E 'altegio-(api|postgres|inbox-worker|outbox-worker|whatsapp-inbox-worker)'

            docker container prune -f
            docker image prune -f
            docker builder prune -f

  notify_success:
    name: Send Telegram Success
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success'

    steps:
      - name: Notify via Telegram
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_TO }}
          message: |
            ✅ *Altegio_bot deployed successfully!*
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`

  notify_failed:
    name: Send Telegram Failure
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: failure()

    steps:
      - name: Notify via Telegram
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_TO }}
          message: |
            ❌ *Altegio_bot pipeline failed*
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            Test: `${{ needs.test.result }}`
            Deploy: `${{ needs.deploy.result }}`