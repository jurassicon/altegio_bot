name: CI / Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: altegio-bot-main
  cancel-in-progress: true

jobs:
  # 1. Проверка стиля кода с помощью Ruff
  lint:
    name: Lint with Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Check syntax and rules (Ruff check)
        run: uvx ruff check .

      - name: Check formatting (Ruff format)
        run: uvx ruff format --check .

  alembic:
    name: Check Alembic migrations
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: altegio_bot_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d altegio_bot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/altegio_bot_test
      ALTEGIO_WEBHOOK_SECRET: test-secret
      WHATSAPP_PROVIDER: dummy
      ALLOW_REAL_SEND: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv and deps
        run: |
          python -m pip install --upgrade pip uv
          uv sync --frozen

      - name: Check exactly one Alembic head
        run: |
          HEADS_COUNT="$(uv run alembic heads | grep -c '(head)' || true)"
          if [ "$HEADS_COUNT" -ne 1 ]; then
            echo "ERROR: Alembic must have exactly one head, got $HEADS_COUNT"
            uv run alembic heads
            exit 1
          fi
          echo "OK: single head confirmed"

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Verify current revision
        run: uv run alembic current

      # NOTE: `alembic upgrade head --sql` (offline SQL generation) is intentionally
      # excluded. Migration 2c24d34e45e2 uses sa.inspect() on an offline
      # MockConnection and causes an error in offline mode. This will be fixed in a
      # separate PR targeting that migration.

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: altegio_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d altegio_bot_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/altegio_bot_test
      ALTEGIO_WEBHOOK_SECRET: test-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv and deps
        run: |
          python -m pip install --upgrade pip uv
          uv sync --frozen

      - name: Wait for Postgres
        run: |
          uv run python - <<'PY'
          import asyncio
          import os
          import asyncpg

          def to_asyncpg_dsn(sqlalchemy_dsn: str) -> str:
              dsn = sqlalchemy_dsn.strip().strip('"').strip("'")
              if dsn.startswith('postgresql+asyncpg://'):
                  return 'postgresql://' + dsn.split('://', 1)[1]
              return dsn

          async def main() -> None:
              raw = os.environ['DATABASE_URL']
              dsn = to_asyncpg_dsn(raw)
              for _ in range(120):
                  try:
                      conn = await asyncpg.connect(dsn, timeout=3)
                      await conn.close()
                      print('Postgres is ready')
                      return
                  except:
                      await asyncio.sleep(1)
              raise SystemExit('Postgres did not become ready')
          asyncio.run(main())
          PY

      - name: Run tests
        run: uv run pytest -q

  deploy:
    name: Deploy to Server
    needs: [tests, alembic]
    if: needs.tests.result == 'success' && needs.alembic.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail

            cd /opt/altegio_bot

            echo "📦 Fetching new code..."
            git fetch origin main
            git reset --hard origin/main

            echo "🔨 Building new images (without starting containers)..."
            docker compose build

            echo "🟢 Starting infrastructure services..."
            docker compose up -d postgres redis

            echo "⏳ Waiting for Postgres to be healthy..."
            MAX_ATTEMPTS=60
            ATTEMPTS=0

            # Ищем контейнер, который принадлежит сервису postgres.
            until [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; do
                # Находим имя контейнера базы данных, как бы он ни назывался
                DB_CONTAINER=$(docker ps --filter "label=com.docker.compose.service=postgres" --filter "label=com.docker.compose.project=altegio_bot" --format "{{.Names}}" | head -n 1)

                if [ -n "$DB_CONTAINER" ] && [ "$(docker inspect -f '{{.State.Health.Status}}' $DB_CONTAINER)" == "healthy" ]; then
                    echo "✅ Postgres ($DB_CONTAINER) is ready!"
                    break
                fi

                ATTEMPTS=$((ATTEMPTS + 1))
                echo "... waiting for database ($ATTEMPTS/$MAX_ATTEMPTS) ..."
                sleep 1
            done

            if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                echo "❌ Timed out waiting for Postgres"
                exit 1
            fi

            # Postgres is confirmed healthy from this point on.
            # Backup is a mandatory gate before migrations — any failure here stops the deploy.
            echo "💾 Creating pre-deploy database backup..."
            mkdir -p /opt/altegio_bot/backups
            DUMP_FILE="/opt/altegio_bot/backups/altegio_before_deploy_$(date -u +%Y%m%dT%H%M%SZ).dump"

            # Credentials come from inside the container (docker compose injected them from .env).
            # This is more reliable than sourcing .env in the remote shell.
            IS_FRESH=false
            docker compose exec -T postgres sh -lc '
              psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT 1"
            ' >/dev/null 2>&1 || IS_FRESH=true

            if [ "$IS_FRESH" = "true" ]; then
              echo "ℹ️ Database does not exist yet — fresh deployment, skipping backup."
            else
              docker compose exec -T postgres sh -lc '
                pg_dump -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Fc
              ' > "$DUMP_FILE"

              test -s "$DUMP_FILE" || {
                echo "❌ Pre-deploy dump is empty — aborting."
                exit 1
              }
              echo "✅ Backup created: $DUMP_FILE"
            fi

            echo "⚙️ Applying DB Migrations..."
            docker compose --profile ops run --rm --no-deps migrate

            echo "🚀 Starting updated containers..."
            docker compose up -d --remove-orphans

            echo "🧹 Aggressive cleanup of unused images..."
            docker image prune -af

            echo "✅ Done! Containers status:"
            docker compose ps

  notify:
    name: Telegram Notification
    needs: [lint, tests, alembic, deploy]

    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify via Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}

          message: |
            🤖 *AltegioBot CI / Deploy Report*

            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`

            *Statuses:*
            🎨 **Lint:** `${{ needs.lint.result }}`
            🧪 **Tests:** `${{ needs.tests.result }}`
            🗄️ **Alembic:** `${{ needs.alembic.result }}`
            🚀 **Deploy:** `${{ needs.deploy.result }}`

            *Run details:*
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}